<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicFlow Pro - PWA Player</title>
    
    <meta name="theme-color" content="#fa243c">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MusicPro">
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2402/2402461.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2402/2402461.png">
    
    <link rel="manifest" id="my-pwa-manifest">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: white; overflow-x: hidden; }
        .glass { background: rgba(28, 28, 30, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); }
        .apple-gradient { background: linear-gradient(135deg, #fa243c 0%, #fb5c74 100%); }
        .song-card { transition: all 0.3s ease; }
        .song-card:hover { transform: scale(1.02); }
        #progressFill { transition: width 0.1s linear; }
        
        /* Install Popup Styling */
        #installBanner {
            display: none;
            position: fixed;
            bottom: 120px;
            left: 20px;
            right: 20px;
            background: #fa243c;
            color: white;
            padding: 15px;
            border-radius: 15px;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(250, 36, 60, 0.3);
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100px); } to { transform: translateY(0); } }
    </style>
</head>
<body class="pb-40">

    <div id="installBanner" class="flex items-center justify-between">
        <div class="flex items-center gap-3">
            <i class="fas fa-mobile-alt text-2xl"></i>
            <div>
                <p class="font-bold text-sm">Music Pro App Install Karein</p>
                <p class="text-[10px] opacity-80">Full Screen Experience Ke Liye</p>
            </div>
        </div>
        <button onclick="triggerInstall()" class="bg-white text-red-600 px-4 py-2 rounded-full text-xs font-bold">INSTALL</button>
    </div>

    <header class="sticky top-0 z-50 glass border-b border-gray-800 p-4">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="location.reload()">
                <i class="fab fa-apple text-3xl text-red-500"></i>
                <h1 class="text-xl font-bold tracking-tight">Music Pro</h1>
            </div>
            <div class="relative w-1/2 max-w-md">
                <input type="text" id="searchInput" placeholder="Search music..." class="w-full bg-gray-900 border border-gray-700 rounded-full py-2 px-10 focus:ring-2 focus:ring-red-500 text-sm outline-none">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 lg:p-8">
        <section class="mb-10">
            <div class="apple-gradient rounded-3xl p-8 flex flex-col md:flex-row items-center gap-8 relative overflow-hidden shadow-2xl">
                <img id="heroArt" src="https://is1-ssl.mzstatic.com/image/thumb/Music112/v4/3d/9f/79/3d9f796a-0174-8902-6c2e-2e453c072b22/886447814461.jpg/600x600bb.jpg" class="w-48 h-48 rounded-2xl shadow-2xl z-10">
                <div class="text-center md:text-left z-10">
                    <h2 id="heroTitle" class="text-4xl font-black">Trending Now</h2>
                    <p id="heroArtist" class="text-lg opacity-80 mt-1">Apple Music Hits</p>
                    <button onclick="playNext()" class="mt-6 bg-white text-black px-8 py-3 rounded-full font-bold hover:scale-105 transition">Listen Now</button>
                </div>
            </div>
        </section>

        <h3 id="sectionTitle" class="text-2xl font-bold mb-6">Popular Songs</h3>
        <div id="resultsGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
    </main>

    <div id="playerBar" class="fixed bottom-0 left-0 right-0 glass border-t border-gray-800 p-4 md:p-6 transition-all transform translate-y-full z-[100]">
        <div class="max-w-7xl mx-auto grid grid-cols-12 items-center gap-4">
            <div class="col-span-12 md:col-span-3 flex items-center gap-4">
                <img id="playerArt" src="" class="w-12 h-12 rounded-lg object-cover">
                <div class="truncate">
                    <p id="playerSongName" class="font-bold text-sm truncate"></p>
                    <p id="playerArtistName" class="text-xs text-gray-400 truncate"></p>
                </div>
            </div>
            <div class="col-span-12 md:col-span-6 flex flex-col items-center">
                <div class="flex items-center gap-6 mb-2">
                    <button onclick="playPrev()" class="text-xl hover:text-red-500"><i class="fas fa-step-backward"></i></button>
                    <button id="playPauseBtn" class="w-10 h-10 bg-white text-black rounded-full flex items-center justify-center shadow-lg"><i class="fas fa-play ml-1"></i></button>
                    <button onclick="playNext()" class="text-xl hover:text-red-500"><i class="fas fa-step-forward"></i></button>
                </div>
                <div class="w-full flex items-center gap-2">
                    <span id="currentTime" class="text-[10px] font-mono text-gray-500 w-8">0:00</span>
                    <div class="flex-1 h-1 bg-gray-800 rounded-full cursor-pointer" id="progressBar">
                        <div id="progressFill" class="h-full bg-red-600 rounded-full w-0"></div>
                    </div>
                    <span id="duration" class="text-[10px] font-mono text-gray-500 w-8">0:00</span>
                </div>
            </div>
        </div>
    </div>

    <audio id="audioElement"></audio>

    <script>
        // --- FIXED PWA CORE ---
        const myManifest = {
            "name": "Music Pro Player",
            "short_name": "MusicPro",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#000000",
            "theme_color": "#fa243c",
            "icons": [{
                "src": "https://cdn-icons-png.flaticon.com/512/2402/2402461.png",
                "sizes": "512x512",
                "type": "image/png",
                "purpose": "any maskable"
            }]
        };

        const manifestStr = JSON.stringify(myManifest);
        const manifestBlob = new Blob([manifestStr], {type: 'application/json'});
        document.querySelector('#my-pwa-manifest').setAttribute('href', URL.createObjectURL(manifestBlob));

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBanner').style.display = 'flex';
        });

        function triggerInstall() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => {
                    deferredPrompt = null;
                    document.getElementById('installBanner').style.display = 'none';
                });
            }
        }

        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'music-v1';
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
            `;
            const swBlob = new Blob([swCode], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(swBlob))
                .then(() => console.log("PWA Service Worker Active"))
                .catch(err => console.log("PWA Error", err));
        }

        // --- PLAYER LOGIC ---
        const searchInput = document.getElementById('searchInput');
        const resultsGrid = document.getElementById('resultsGrid');
        const playerBar = document.getElementById('playerBar');
        const audioElement = document.getElementById('audioElement');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const progressFill = document.getElementById('progressFill');
        const progressBar = document.getElementById('progressBar');

        let currentQueue = [];
        let currentIndex = -1;

        window.onload = () => searchMusic('Hindi Trending');

        searchInput.onkeypress = (e) => {
            if (e.key === 'Enter') {
                searchMusic(searchInput.value);
                document.getElementById('sectionTitle').innerText = `Results for "${searchInput.value}"`;
            }
        };

        async function searchMusic(term) {
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&entity=song&limit=20`);
            const data = await res.json();
            currentQueue = data.results;
            resultsGrid.innerHTML = '';
            currentQueue.forEach((track, i) => {
                const card = document.createElement('div');
                card.className = 'song-card cursor-pointer';
                card.innerHTML = `
                    <div class="relative rounded-xl overflow-hidden aspect-square mb-2">
                        <img src="${track.artworkUrl100.replace('100x100', '400x400')}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 hover:opacity-100 transition">
                            <i class="fas fa-play text-white text-2xl"></i>
                        </div>
                    </div>
                    <p class="text-sm font-bold truncate">${track.trackName}</p>
                    <p class="text-xs text-gray-500 truncate">${track.artistName}</p>
                `;
                card.onclick = () => playTrack(i);
                resultsGrid.appendChild(card);
            });
        }

        function playTrack(i) {
            currentIndex = i;
            const track = currentQueue[i];
            playerBar.classList.remove('translate-y-full');
            document.getElementById('playerArt').src = track.artworkUrl100;
            document.getElementById('playerSongName').innerText = track.trackName;
            document.getElementById('playerArtistName').innerText = track.artistName;
            document.getElementById('heroArt').src = track.artworkUrl100.replace('100x100', '600x600');
            document.getElementById('heroTitle').innerText = track.trackName;
            document.getElementById('heroArtist').innerText = track.artistName;
            audioElement.src = track.previewUrl;
            audioElement.play();
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        }

        playPauseBtn.onclick = () => {
            if (audioElement.paused) { audioElement.play(); playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>'; }
            else { audioElement.pause(); playPauseBtn.innerHTML = '<i class="fas fa-play ml-1"></i>'; }
        };

        audioElement.ontimeupdate = () => {
            const p = (audioElement.currentTime / audioElement.duration) * 100;
            progressFill.style.width = p + '%';
            document.getElementById('currentTime').innerText = formatTime(audioElement.currentTime);
            document.getElementById('duration').innerText = formatTime(audioElement.duration || 0);
        };

        audioElement.onended = () => playNext();

        function playNext() { if (currentIndex < currentQueue.length - 1) playTrack(currentIndex + 1); }
        function playPrev() { if (currentIndex > 0) playTrack(currentIndex - 1); }
        function formatTime(s) { 
            const m = Math.floor(s/60); 
            const sec = Math.floor(s%60); 
            return `${m}:${sec.toString().padStart(2,'0')}`; 
        }

        progressBar.onclick = (e) => {
            const rect = progressBar.getBoundingClientRect();
            audioElement.currentTime = ((e.clientX - rect.left) / rect.width) * audioElement.duration;
        };
    </script>
</body>
                        </html>
