<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicFlow Pro - AutoPlay & Download</title>
    
    <meta name="theme-color" content="#fa243c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2402/2402461.png">
    
    <link rel="manifest" id="pwa-manifest">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: white;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(28, 28, 30, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
        }

        .apple-gradient {
            background: linear-gradient(135deg, #fa243c 0%, #fb5c74 100%);
        }

        .song-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .song-card:hover { transform: translateY(-5px); }

        #progressFill { transition: width 0.1s linear; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }

        .download-btn:hover {
            color: #fa243c;
            transform: scale(1.2);
        }

        /* PWA Install Button Style */
        #pwaInstallBtn {
            display: none;
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 999;
            background: #fa243c;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(250, 36, 60, 0.4);
        }
    </style>
</head>
<body class="pb-40">

    <button id="pwaInstallBtn" onclick="installMusicApp()">
        <i class="fas fa-download mr-2"></i> Install App
    </button>

    <header class="sticky top-0 z-50 glass border-b border-gray-800 p-4">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="location.reload()">
                <i class="fab fa-apple text-3xl text-red-500"></i>
                <h1 class="text-xl font-bold tracking-tight">Music Pro</h1>
            </div>
            <div class="relative w-1/2 max-w-md">
                <input 
                    type="text" 
                    id="searchInput"
                    placeholder="Gaane ya artist search karein..." 
                    class="w-full bg-gray-900 border border-gray-700 rounded-full py-2 px-10 focus:ring-2 focus:ring-red-500 text-sm outline-none transition-all"
                >
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 lg:p-8">
        <section id="hero" class="mb-10">
            <div class="apple-gradient rounded-3xl p-8 flex flex-col md:flex-row items-center gap-8 shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-20">
                    <i class="fas fa-music text-9xl"></i>
                </div>
                <img id="heroArt" src="https://is1-ssl.mzstatic.com/image/thumb/Music112/v4/3d/9f/79/3d9f796a-0174-8902-6c2e-2e453c072b22/886447814461.jpg/600x600bb.jpg" class="w-56 h-56 rounded-2xl shadow-2xl z-10" alt="Featured">
                <div class="text-center md:text-left z-10">
                    <span class="bg-black/20 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest">Recommended</span>
                    <h2 id="heroTitle" class="text-4xl md:text-6xl font-black mt-3 leading-tight">Trending Hits</h2>
                    <p id="heroArtist" class="text-xl opacity-80 mt-2 font-medium">Apple Music Daily</p>
                    <div class="flex gap-4 mt-8 justify-center md:justify-start">
                        <button onclick="playNext()" class="bg-white text-black px-10 py-3 rounded-full font-bold hover:scale-105 transition-transform flex items-center gap-3">
                            <i class="fas fa-play"></i> Listen Now
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <div class="flex justify-between items-center mb-8">
            <h3 id="sectionTitle" class="text-2xl font-bold">Aapke Liye Chune Gaye</h3>
            <div class="flex gap-2">
                <span id="autoPlayStatus" class="text-[10px] bg-green-500/20 text-green-400 px-2 py-1 rounded border border-green-500/30">
                    <i class="fas fa-magic mr-1"></i> AUTO-PLAY ON
                </span>
            </div>
        </div>

        <div id="resultsGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
    </main>

    <div id="playerBar" class="fixed bottom-0 left-0 right-0 glass border-t border-gray-800 px-4 py-4 md:py-6 transition-all transform translate-y-full shadow-[0_-10px_40px_rgba(0,0,0,0.5)] z-[100]">
        <div class="max-w-7xl mx-auto grid grid-cols-12 items-center gap-4">
            <div class="col-span-12 md:col-span-3 flex items-center gap-4">
                <img id="playerArt" src="" class="w-14 h-14 rounded-lg shadow-md object-cover">
                <div class="truncate">
                    <p id="playerSongName" class="font-bold text-sm md:text-base truncate"></p>
                    <p id="playerArtistName" class="text-xs text-gray-400 truncate"></p>
                </div>
                <button id="downloadBtn" title="Download" class="ml-auto md:ml-4 text-gray-400 download-btn transition-all">
                    <i class="fas fa-cloud-download-alt text-xl"></i>
                </button>
            </div>

            <div class="col-span-12 md:col-span-6 flex flex-col items-center">
                <div class="flex items-center gap-8 mb-3">
                    <button class="text-gray-500 hover:text-white transition"><i class="fas fa-random"></i></button>
                    <button onclick="playPrev()" class="text-xl hover:text-red-500 transition"><i class="fas fa-step-backward"></i></button>
                    <button id="playPauseBtn" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center text-xl hover:scale-110 active:scale-95 transition shadow-lg">
                        <i class="fas fa-play ml-1"></i>
                    </button>
                    <button onclick="playNext()" class="text-xl hover:text-red-500 transition"><i class="fas fa-step-forward"></i></button>
                    <button class="text-gray-500 hover:text-white transition"><i class="fas fa-redo"></i></button>
                </div>
                <div class="w-full flex items-center gap-3">
                    <span id="currentTime" class="text-[10px] font-mono text-gray-500 w-10 text-right">0:00</span>
                    <div class="flex-1 h-1.5 bg-gray-800 rounded-full cursor-pointer group relative" id="progressBar">
                        <div id="progressFill" class="absolute top-0 left-0 h-full bg-red-600 rounded-full"></div>
                    </div>
                    <span id="duration" class="text-[10px] font-mono text-gray-500 w-10">0:00</span>
                </div>
            </div>

            <div class="hidden md:flex col-span-3 items-center justify-end gap-3">
                <i class="fas fa-volume-down text-gray-500"></i>
                <input type="range" class="w-24 h-1 bg-gray-800 rounded-lg appearance-none accent-red-500 cursor-pointer" min="0" max="1" step="0.05" value="1" id="volumeControl">
                <i class="fas fa-volume-up text-gray-500"></i>
            </div>
        </div>
    </div>

    <audio id="audioElement"></audio>

    <script>
        // --- PWA LOGIC (Single File Solution) ---
        const pwaManifest = {
            "name": "MusicFlow Pro Player",
            "short_name": "MusicFlow",
            "description": "Premium Apple Music Style Player",
            "start_url": "./index.html",
            "display": "standalone",
            "background_color": "#000000",
            "theme_color": "#fa243c",
            "icons": [{
                "src": "https://cdn-icons-png.flaticon.com/512/2402/2402461.png",
                "sizes": "512x512",
                "type": "image/png"
            }]
        };

        const manifestBlob = new Blob([JSON.stringify(pwaManifest)], {type: 'application/json'});
        document.querySelector('#pwa-manifest').setAttribute('href', URL.createObjectURL(manifestBlob));

        let deferredPrompt;
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
            `;
            const swBlob = new Blob([swCode], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(swBlob));
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('pwaInstallBtn').style.display = 'block';
        });

        function installMusicApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => {
                    deferredPrompt = null;
                    document.getElementById('pwaInstallBtn').style.display = 'none';
                });
            }
        }

        // --- PLAYER LOGIC ---
        const searchInput = document.getElementById('searchInput');
        const resultsGrid = document.getElementById('resultsGrid');
        const playerBar = document.getElementById('playerBar');
        const audioElement = document.getElementById('audioElement');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const progressFill = document.getElementById('progressFill');
        const progressBar = document.getElementById('progressBar');
        const sectionTitle = document.getElementById('sectionTitle');
        const downloadBtn = document.getElementById('downloadBtn');

        let currentQueue = [];
        let currentIndex = -1;

        window.onload = () => { searchMusic('Bollywood Hits'); };

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const q = searchInput.value.trim();
                if (q) {
                    searchMusic(q);
                    sectionTitle.innerText = `Natije: "${q}"`;
                }
            }
        });

        async function searchMusic(term) {
            try {
                const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&entity=song&limit=25`);
                const data = await response.json();
                currentQueue = data.results;
                renderTracks(currentQueue);
            } catch (err) { console.error('Error:', err); }
        }

        function renderTracks(tracks) {
            resultsGrid.innerHTML = '';
            tracks.forEach((track, index) => {
                const card = document.createElement('div');
                card.className = 'song-card group relative cursor-pointer';
                card.innerHTML = `
                    <div class="relative overflow-hidden rounded-2xl aspect-square mb-3 bg-gray-900 shadow-xl">
                        <img src="${track.artworkUrl100.replace('100x100', '400x400')}" class="w-full h-full object-cover group-hover:opacity-60 transition-all duration-500">
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <div class="w-14 h-14 bg-red-600 rounded-full flex items-center justify-center shadow-2xl transform translate-y-4 group-hover:translate-y-0 transition-transform">
                                <i class="fas fa-play text-xl text-white"></i>
                            </div>
                        </div>
                    </div>
                    <div class="px-1">
                        <h4 class="font-semibold text-sm truncate leading-tight">${track.trackName}</h4>
                        <p class="text-xs text-gray-500 truncate mt-1">${track.artistName}</p>
                    </div>
                `;
                card.onclick = () => playTrack(index);
                resultsGrid.appendChild(card);
            });
        }

        function playTrack(index) {
            if (index < 0 || index >= currentQueue.length) return;
            currentIndex = index;
            const track = currentQueue[currentIndex];
            playerBar.classList.remove('translate-y-full');
            document.getElementById('playerArt').src = track.artworkUrl100;
            document.getElementById('playerSongName').innerText = track.trackName;
            document.getElementById('playerArtistName').innerText = track.artistName;
            document.getElementById('heroArt').src = track.artworkUrl100.replace('100x100', '600x600');
            document.getElementById('heroTitle').innerText = track.trackName;
            document.getElementById('heroArtist').innerText = track.artistName;

            audioElement.src = track.previewUrl;
            audioElement.play();
            updatePlayBtn(true);

            downloadBtn.onclick = (e) => {
                e.stopPropagation();
                window.open(track.previewUrl, '_blank');
            };
        }

        audioElement.onended = () => { playNext(); };

        function playNext() {
            if (currentIndex < currentQueue.length - 1) playTrack(currentIndex + 1);
            else playTrack(0);
        }

        function playPrev() {
            if (currentIndex > 0) playTrack(currentIndex - 1);
            else playTrack(currentQueue.length - 1);
        }

        playPauseBtn.onclick = () => {
            if (audioElement.paused) { audioElement.play(); updatePlayBtn(true); }
            else { audioElement.pause(); updatePlayBtn(false); }
        };

        function updatePlayBtn(isPlaying) {
            playPauseBtn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play ml-1"></i>';
        }

        audioElement.ontimeupdate = () => {
            const p = (audioElement.currentTime / audioElement.duration) * 100;
            progressFill.style.width = `${p}%`;
            document.getElementById('currentTime').innerText = formatTime(audioElement.currentTime);
            document.getElementById('duration').innerText = formatTime(audioElement.duration || 0);
        };

        progressBar.onclick = (e) => {
            const rect = progressBar.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            audioElement.currentTime = pos * audioElement.duration;
        };

        document.getElementById('volumeControl').oninput = (e) => { audioElement.volume = e.target.value; };

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec.toString().padStart(2, '0')}`;
        }
    </script>
</body>
    </html>
